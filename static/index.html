<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spindle</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/style.css">
    <script>
        document.addEventListener('refreshDone', function(e) {
            var t = document.getElementById('refresh-toast');
            t.textContent = e.detail.msg;
            t.classList.remove('refresh-toast');
            void t.offsetWidth; // force reflow to restart CSS animation
            t.classList.add('refresh-toast');
        });
    </script>
</head>
<body>
    <div class="app">
        <header>
            <div>
                <h1>Spindle</h1>
                <span class="subtitle">Spin + WASM RSS Reader</span>
            </div>
            <div hx-get="/api/ui/auth-status" hx-trigger="load" hx-swap="innerHTML"></div>
        </header>

        <div class="layout">
            <aside class="sidebar">
                <div class="subscribe-form">
                    <form hx-post="/api/ui/feeds"
                          hx-target="#feed-list"
                          hx-swap="innerHTML"
                          hx-on::after-request="if(event.detail.successful) this.reset()">
                        <input type="url" name="url" placeholder="Paste feed URL..." required>
                        <button type="submit">+</button>
                    </form>
                </div>
                <nav>
                    <div id="feed-list"
                         hx-get="/api/ui/feeds"
                         hx-trigger="load"
                         hx-swap="innerHTML">
                        <p class="loading">Loading...</p>
                    </div>
                </nav>
            </aside>

            <main class="content">
                <div class="content-header">
                    <h2 id="content-title">All Articles</h2>
                    <div class="content-actions">
                        <span id="refresh-toast"></span>
                        <button hx-post="/api/ui/articles/mark-all-read"
                                hx-target="#article-list"
                                hx-swap="innerHTML"
                                class="btn-secondary">
                            Mark all read
                        </button>
                        <button hx-post="/api/ui/feeds/refresh-all"
                                hx-target="#article-list"
                                hx-swap="innerHTML"
                                hx-disabled-elt="this"
                                class="btn-secondary">
                            Refresh
                        </button>
                    </div>
                </div>

                <div id="article-list"
                     hx-get="/api/ui/articles"
                     hx-trigger="load"
                     hx-swap="innerHTML">
                    <p class="loading">Loading articles...</p>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
